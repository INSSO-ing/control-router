<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INSSO - Control de Router</title>
    <style>
        /* Tus estilos CSS de producción van acá (fuentes, colores, rejilla de tarjetas) */
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>Dashboard de Red - INSSO</h1>
        <div id="contenedor-tarjetas" class="grid"></div>
    </div>

    <script>
        // ============================================================
        // EL ROBOT DE PYTHON MODIFICA ESTA VARIABLE AUTOMÁTICAMENTE:
        // ============================================================
        let dispositivos = [
    {
        "nombre": "Dispositivo Red - 5",
        "ip": "192.168.100.5",
        "mac": "Mapeada (Puerto DHCP)",
        "tipo": "Wi-Fi 5G",
        "online": true,
        "consumoGB": 22.4,
        "maxPlan": 300
    },
    {
        "nombre": "Panel LED M\u00f3dulo Principal",
        "ip": "192.168.100.12",
        "mac": "Mapeada (Puerto DHCP)",
        "tipo": "Cable LAN (LAN1)",
        "online": true,
        "consumoGB": 53.6,
        "maxPlan": 300
    },
    {
        "nombre": "Smart TV - Living",
        "ip": "192.168.100.15",
        "mac": "Mapeada (Puerto DHCP)",
        "tipo": "Wi-Fi 5G",
        "online": true,
        "consumoGB": 84.8,
        "maxPlan": 300
    },
    {
        "nombre": "Dispositivo Red - 22",
        "ip": "192.168.100.22",
        "mac": "Mapeada (Puerto DHCP)",
        "tipo": "Cable LAN (LAN1)",
        "online": true,
        "consumoGB": 116.0,
        "maxPlan": 300
    },
    {
        "nombre": "PC Escritorio - Principal",
        "ip": "192.168.100.33",
        "mac": "Mapeada (Puerto DHCP)",
        "tipo": "Wi-Fi 5G",
        "online": true,
        "consumoGB": 147.2,
        "maxPlan": 300
    }
];

        // ============================================================
        // LÓGICA DE TU INTERFAZ INTERACTIVA:
        // ============================================================
        function renderizarPanel() {
            const contenedor = document.getElementById('contenedor-tarjetas');
            contenedor.innerHTML = ''; // Limpiamos pantalla

            dispositivos.forEach(dev => {
                // Calcula el porcentaje de consumo frente al plan de 300GB
                const porcentaje = (dev.consumoGB / dev.maxPlan) * 100;

                // Inyecta las tarjetas dinámicas con barra de progreso
                contenedor.innerHTML += `
                    <div class="tarjeta-equipo">
                        <h3>${dev.nombre}</h3>
                        <p><strong>IP:</strong> ${dev.ip}</p>
                        <p><strong>Conexión:</strong> ${dev.tipo}</p>
                        <p><strong>Estado:</strong> <span class="badge online">Activo</span></p>
                        <div class="medidor-consumo">
                            <span class="etiqueta-consumo">Consumo: ${dev.consumoGB} GB</span>
                            <div class="barra-progreso">
                                <div class="progreso-interno" style="width: ${porcentaje}%"></div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // Ejecuta el renderizado apenas carga la página en el navegador
        window.onload = renderizarPanel;
    </script>
</body>
</html>
